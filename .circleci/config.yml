version: 2.1

orbs:
  sonarcloud: sonarsource/sonarcloud@2.0.0
  aws-cli: circleci/aws-cli@5.1.1
  aws_assume_role: lbh-hackit/aws_assume_role@0.1.0

executors:
  node-executor:
    docker:
      - image: cimg/node:24.14-browsers
  docker-terraform:
    docker:
      - image: hashicorp/terraform:1.14.5
  docker-python:
    docker:
      - image: cimg/python:3.11

references:
  workspace_root: &workspace_root "~"
  attach_workspace: &attach_workspace
    attach_workspace:
      at: *workspace_root

commands:
  install-python3:
    description: "Installs python3.12-venv required by aws-cli"
    steps:
      - run:
          name: Install python3.12-venv
          command: |
            sudo apt-get update
            sudo DEBIAN_FRONTEND=noninteractive apt-get install -y python3.12-venv
  assume-role-and-persist-workspace:
    description: "Assumes deployment role and persists credentials across jobs"
    parameters:
      aws-account:
        type: string
    steps:
      - checkout
      - install-python3
      - aws_assume_role/assume_role:
          account: <<parameters.aws-account>>
          profile_name: default
          role: "LBH_Circle_CI_Deployment_Role"
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .aws

  build-and-package:
    parameters:
      environment:
        type: enum
        enum: ["development", "staging", "production"]
    steps:
      - install-python3
      - aws-cli/install
      - run:
          name: Create .env file
          command: |
            MAP_BOX_URL=$(aws ssm get-parameter --name /fss-portal-api/<<parameters.environment>>/map-box-url --query Parameter.Value --output text)
            MAP_BOX_TOKEN=$(aws ssm get-parameter --name /fss-portal-api/<<parameters.environment>>/map-box-token --query Parameter.Value --output text)
            cat \<<EOF >.env
            VITE_MAP_BOX_URL=${MAP_BOX_URL}
            VITE_MAP_BOX_TOKEN=${MAP_BOX_TOKEN}
            EOF
      - run:
          name: Authenticate FontAwesome
          command: |
            echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
            echo "//npm.fontawesome.com/:_authToken=${FONTAWESOME_TOKEN}" >> .npmrc
      - run:
          name: Build
          command: CI=false yarn build --mode <<parameters.environment>>
      - run:
          name: Package WordPress plugin
          command: |
            rm -rf wordpress/lbh-fss-public-frontend
            mkdir -p wordpress/lbh-fss-public-frontend/build
            cp -r build/. wordpress/lbh-fss-public-frontend/build/
            cd wordpress
            zip -r ../fss-directory.zip . \
              -x "*.git*" \
              -x "*.zip" \
              -x "export-plugin.sh" \
              -x "lbh-fss-public-frontend/node_modules/*" \
              -x "*.map"
      - run:
          name: Upload plugin zip to S3
          command: |
            aws s3 cp fss-directory.zip \
              s3://fss-wordpress-plugin-<<parameters.environment>>/fss-directory.zip

  preview-terraform:
    description: "Previews terraform configuration changes"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          name: Preview terraform
          command: |
            terraform init \
              -backend-config="bucket=terraform-state-<<parameters.environment>>-apis" \
              -backend-config="key=services/fss-public-frontend/terraform.tfstate"
            terraform validate
            terraform plan -var="environment=<<parameters.environment>>"

  deploy-terraform:
    description: "Initializes and applies terraform configuration"
    parameters:
      environment:
        type: string
    steps:
      - *attach_workspace
      - checkout
      - run:
          name: Initialize and apply terraform
          command: |
            terraform init \
              -backend-config="bucket=terraform-state-<<parameters.environment>>-apis" \
              -backend-config="key=services/fss-public-frontend/terraform.tfstate"
            terraform validate
            terraform apply -auto-approve -var="environment=<<parameters.environment>>"

jobs:
  install-dependencies:
    executor: node-executor
    steps:
      - checkout:
          method: full
      - run:
          name: Authenticate FontAwesome
          command: |
            echo "@fortawesome:registry=https://npm.fontawesome.com/" >> .npmrc
            echo "//npm.fontawesome.com/:_authToken=${FONTAWESOME_TOKEN}" >> .npmrc
      - run:
          name: Install dependencies
          command: yarn install
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - .

  lint-check:
    executor: node-executor
    steps:
      - *attach_workspace
      - run:
          name: Run ESLint
          command: yarn lint

  test-check:
    executor: node-executor
    steps:
      - *attach_workspace
      - run:
          name: Run Tests
          command: yarn test:ci
          environment:
            CI: "true"
            NODE_OPTIONS: "--max-old-space-size=4096"
            JEST_JUNIT_OUTPUT_DIR: test_results
            JEST_JUNIT_ADD_FILE_ATTRIBUTE: "true"
      - store_test_results:
          path: test_results
      - store_artifacts:
          path: coverage
      - persist_to_workspace:
          root: *workspace_root
          paths:
            - project/coverage

  format-check:
    executor: node-executor
    steps:
      - *attach_workspace
      - run:
          name: Run Prettier
          command: yarn format:check

  security-audit:
    executor: node-executor
    steps:
      - *attach_workspace
      - run:
          name: Run security audit (critical only)
          command: yarn audit-ci --critical

  sonar-scan:
    executor: docker-python
    steps:
      - *attach_workspace
      - sonarcloud/scan

  assume-role-development:
    executor: node-executor
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_DEVELOPMENT

  assume-role-staging:
    executor: node-executor
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_STAGING

  assume-role-production:
    executor: node-executor
    steps:
      - assume-role-and-persist-workspace:
          aws-account: $AWS_ACCOUNT_PRODUCTION

  deploy-development:
    executor: node-executor
    steps:
      - *attach_workspace
      - build-and-package:
          environment: development

  deploy-staging:
    executor: node-executor
    steps:
      - *attach_workspace
      - build-and-package:
          environment: staging

  deploy-production:
    executor: node-executor
    steps:
      - *attach_workspace
      - build-and-package:
          environment: production

  preview-development-terraform:
    executor: docker-terraform
    steps:
      - preview-terraform:
          environment: development

  terraform-init-and-apply-to-development:
    executor: docker-terraform
    steps:
      - deploy-terraform:
          environment: development

  terraform-init-and-apply-to-staging:
    executor: docker-terraform
    steps:
      - deploy-terraform:
          environment: staging

  preview-staging-terraform:
    executor: docker-terraform
    steps:
      - preview-terraform:
          environment: staging

  preview-production-terraform:
    executor: docker-terraform
    steps:
      - preview-terraform:
          environment: production

  terraform-init-and-apply-to-production:
    executor: docker-terraform
    steps:
      - deploy-terraform:
          environment: production

workflows:
  continuous-delivery:
    jobs:
      - install-dependencies
      - lint-check:
          requires: [install-dependencies]
      - test-check:
          requires: [install-dependencies]
      - format-check:
          requires: [install-dependencies]
      - security-audit:
          requires: [install-dependencies]
      - sonar-scan:
          context: SonarCloud
          requires: [test-check]

      # Terraform preview for feature branches
      - assume-role-development:
          name: assume-role-development-preview
          context: api-assume-role-development-context
          filters:
            branches:
              ignore: [master, develop, build/decouple-tf]
      - preview-development-terraform:
          requires: [assume-role-development-preview]
          filters:
            branches:
              ignore: [master, develop, build/decouple-tf]

      # Development deployment
      - permit-deploy-development:
          type: approval
          requires: [lint-check, test-check, format-check, security-audit, sonar-scan]
          filters:
            branches:
              only: [develop, build/decouple-tf]
      - assume-role-development:
          name: assume-role-development-deploy
          context: api-assume-role-development-context
          requires: [permit-deploy-development]
          filters:
            branches:
              only: [develop, build/decouple-tf]
      - deploy-development:
          requires: [assume-role-development-deploy]
          filters:
            branches:
              only: [develop, build/decouple-tf]

      # Staging deployment
      - permit-deploy-staging:
          type: approval
          requires: [lint-check, test-check, format-check, security-audit, sonar-scan]
          filters:
            branches:
              only: [master]
      - assume-role-staging:
          name: assume-role-staging-deploy
          context: api-assume-role-staging-context
          requires: [permit-deploy-staging]
          filters:
            branches:
              only: [master]
      - deploy-staging:
          requires: [assume-role-staging-deploy]
          filters:
            branches:
              only: [master]

      # Production deployment
      - assume-role-production:
          context: api-assume-role-production-context
          requires: [deploy-staging]
          filters:
            branches:
              only: [master]
      - permit-deploy-production:
          type: approval
          requires: [deploy-staging]
          filters:
            branches:
              only: [master]
      - deploy-production:
          requires: [permit-deploy-production, assume-role-production]
          filters:
            branches:
              only: [master]

  terraform-release:
    jobs:
      # Development terraform
      - assume-role-development:
          context: api-assume-role-development-context
          filters:
            branches:
              only: [develop, build/decouple-tf]
      - preview-development-terraform:
          requires: [assume-role-development]
          filters:
            branches:
              only: [develop, build/decouple-tf]
      - permit-terraform-development-release:
          type: approval
          requires: [preview-development-terraform]
          filters:
            branches:
              only: [develop, build/decouple-tf]
      - terraform-init-and-apply-to-development:
          requires: [permit-terraform-development-release]
          filters:
            branches:
              only: [develop, build/decouple-tf]

      # Staging terraform
      - assume-role-staging:
          context: api-assume-role-staging-context
          filters:
            branches:
              only: [master]
      - preview-staging-terraform:
          requires: [assume-role-staging]
          filters:
            branches:
              only: [master]
      - permit-terraform-staging-release:
          type: approval
          requires: [preview-staging-terraform]
          filters:
            branches:
              only: [master]
      - terraform-init-and-apply-to-staging:
          requires: [permit-terraform-staging-release]
          filters:
            branches:
              only: [master]

      # Production terraform
      - assume-role-production:
          context: api-assume-role-production-context
          requires: [terraform-init-and-apply-to-staging]
          filters:
            branches:
              only: [master]
      - preview-production-terraform:
          requires: [assume-role-production]
          filters:
            branches:
              only: [master]
      - permit-terraform-production-release:
          type: approval
          requires: [preview-production-terraform]
          filters:
            branches:
              only: [master]
      - terraform-init-and-apply-to-production:
          requires: [permit-terraform-production-release]
          filters:
            branches:
              only: [master]
